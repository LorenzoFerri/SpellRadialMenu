name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build RadialSpellMenu release package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl git xz-utils zip

      - name: Build DLL
        run: bash build.sh

      - name: Package release zip
        run: |
          mkdir -p dist/RadialSpellMenu
          cp natives/RadialSpellMenu.dll dist/RadialSpellMenu/
          cp RadialSpellMenuProfile.me3 dist/RadialSpellMenu/
          cd dist
          zip -r RadialSpellMenu.zip RadialSpellMenu

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadialSpellMenu
          path: dist/RadialSpellMenu.zip
          if-no-files-found: error

      - name: Create release for version tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/RadialSpellMenu.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes "RadialSpellMenu ${GITHUB_REF_NAME}"

      - name: Attach zip to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/RadialSpellMenu.zip --clobber
