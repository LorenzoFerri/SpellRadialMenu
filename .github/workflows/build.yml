name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build RadialMenu release package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl git xz-utils zip

      - name: Build DLL
        run: bash build.sh

      - name: Package release zip
        run: |
          mkdir -p dist/RadialMenu
          cp natives/RadialMenu.dll dist/RadialMenu/
          cp RadialMenuProfile.me3 dist/RadialMenu/
          cd dist
          zip -r RadialMenu.zip RadialMenu

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadialMenu
          path: dist/RadialMenu.zip
          if-no-files-found: error

      - name: Create release for version tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/RadialMenu.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes "RadialMenu ${GITHUB_REF_NAME}"

      - name: Attach zip to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/RadialMenu.zip --clobber
